<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김태림 라이브 다시보기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="effect-layer" id="effectLayer"></div>
  <div class="yt-app">
    <header class="yt-header">
      <div class="yt-brand">
        <div class="yt-logo">▶</div>
        <div class="yt-title">김태림 라이브 다시보기</div>
      </div>
      <div class="yt-search">
        <input type="text" placeholder="라이브 다시보기 검색" />
      </div>
      <div class="yt-actions">
        <div class="yt-live">LIVE</div>
        <div class="yt-avatar">KT</div>
      </div>
    </header>

    <main class="yt-layout">
      <section class="yt-main">
        <div class="live-card">
          <div class="live-badge">오늘의 라이브 다시보기</div>
          <h1 class="live-title" id="liveTitle">산뜻한 브이로그 데이 로그</h1>
          <div class="live-meta" id="liveMeta">업로드 0개 · 시청 0회</div>
          <div class="live-stats">
            <div class="stat">
              <span class="label">조회수</span>
              <span class="value" id="viewCount">0</span>
            </div>
            <div class="stat">
              <span class="label">좋아요</span>
              <span class="value" id="likeCount">0</span>
            </div>
            <div class="stat">
              <span class="label">싫어요</span>
              <span class="value" id="dislikeCount">0</span>
            </div>
            <div class="stat">
              <span class="label">댓글</span>
              <span class="value" id="commentCount">0</span>
            </div>
            <div class="stat">
              <span class="label">구독자</span>
              <span class="value" id="subCount">0</span>
            </div>
            <div class="stat">
              <span class="label">수익</span>
              <span class="value" id="moneyCount">₩0</span>
            </div>
          </div>
          <div class="live-tags" id="liveTags">
            <span class="tag">브이로그</span>
            <span class="tag">라이브</span>
            <span class="tag">갓생</span>
          </div>
        </div>

        <div class="section-head">
          <h2>타임라인 챕터</h2>
          <p>하루의 흐름이 하나의 라이브로 기록됩니다.</p>
        </div>
        <div class="timeline-list" id="postList">
          <div class="empty">아직 로그가 없습니다. 텔레그램으로 하루를 기록해보세요.</div>
        </div>

        <div class="section-head">
          <h2>레전드 클립</h2>
          <p>갓생 폭발 구간은 클립으로 자동 보관됩니다.</p>
        </div>
        <div class="clips-list" id="clipsList">
          <div class="clip-empty">아직 클립이 없습니다.</div>
        </div>
      </section>

      <aside class="yt-chat">
        <div class="chat-head">
          <div>
            <div class="chat-title">라이브 채팅</div>
            <div class="chat-sub">유튜브 감성 응원 스트림</div>
          </div>
          <button class="chat-pill">Top chat</button>
        </div>
        <div class="chat-list" id="chatList">
          <div class="chat-empty">첫 로그가 올라오면 채팅이 흐릅니다.</div>
        </div>
      </aside>
    </main>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-header">
      <button class="back" id="backBtn">←</button>
      <div class="overlay-title" id="overlayTitle">게시글</div>
    </div>
    <div class="overlay-body" id="overlayBody"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
